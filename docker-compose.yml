services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /workspace
    command: ["sh", "-lc", "sleep infinity"]
    environment:
      CI: "1"
      HOME: /home/node
      npm_config_store_dir: /pnpm/store
      PAPERCLIP_HOME: /workspace/.paperclip-container
    user: node
    volumes:
      - .:/workspace
      - paperclip-node-modules:/workspace/node_modules
      - paperclip-pnpm-store:/pnpm/store

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip-local-dev-secret}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
  paperclip-node-modules:
  paperclip-pnpm-store:
