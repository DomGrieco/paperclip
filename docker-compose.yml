services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    working_dir: /workspace
    command: ["sh", "-lc", "sleep infinity"]
    environment:
      CI: "1"
      HOME: /home/node
      npm_config_store_dir: /pnpm/store
      PAPERCLIP_HOME: /workspace/.paperclip-container
    user: node
    volumes:
      - .:/workspace
      - paperclip-node-modules:/workspace/node_modules
      - paperclip-pnpm-store:/pnpm/store

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: paperclip
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build: .
    user: root
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip-local-dev-secret}"
      PAPERCLIP_HERMES_CONTAINER_LAUNCHER_ENABLED: "true"
      PAPERCLIP_HERMES_CONTAINER_FALLBACK_IMAGE: "paperclip-server:latest"
    volumes:
      - paperclip-data:/paperclip
      - ${HOME}/.hermes:/paperclip/shared/hermes-home-source:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/docker:/usr/local/bin/docker:ro
    depends_on:
      db:
        condition: service_healthy

  server-dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-tools
    working_dir: /workspace
    command: ["sh", "-lc", "pnpm dev --tailscale-auth"]
    environment:
      CI: "1"
      HOME: /paperclip
      npm_config_store_dir: /pnpm/store
      DATABASE_URL: postgres://paperclip:paperclip@db:5432/paperclip
      PORT: "3100"
      PAPERCLIP_HOME: /paperclip
      PAPERCLIP_INSTANCE_ID: default
      PAPERCLIP_CONFIG: /paperclip/instances/default/config.json
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-paperclip-local-dev-secret}"
      PAPERCLIP_HERMES_CONTAINER_LAUNCHER_ENABLED: "true"
      PAPERCLIP_HERMES_CONTAINER_FALLBACK_IMAGE: "paperclip-server:latest"
    user: root
    ports:
      - "3100:3100"
    volumes:
      - .:/workspace
      - paperclip-node-modules:/workspace/node_modules
      - paperclip-pnpm-store:/pnpm/store
      - paperclip-data:/paperclip
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/docker:/usr/local/bin/docker:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  paperclip-data:
  paperclip-node-modules:
  paperclip-pnpm-store:
